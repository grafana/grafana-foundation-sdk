      by_builder: queryv2.typeMath
      as: math
  - rename:
      by_builder: queryv2.typeSql
      as: sql
  - rename:
      by_builder: queryv2.typeThreshold
      as: threshold
  - rename:
      by_builder: queryv2.typeClassicConditions
      as: classicConditions
  - rename:
      by_builder: queryv2.typeResample
      as: resample
  - rename:
      by_builder: queryv2.typeReduce
      as: reduce
