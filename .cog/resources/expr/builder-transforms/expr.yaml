# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/cog/main/schemas/veneers.json

languages: [all]

package: expr

options:
  # Dashboardv2beta1
  - rename:
      by_builder: query.typeMath
      as: math
  - rename:
      by_builder: query.typeSql
      as: sql
  - rename:
      by_builder: query.typeThreshold
      as: threshold
  - rename:
      by_builder: query.typeClassicConditions
      as: classicConditions
