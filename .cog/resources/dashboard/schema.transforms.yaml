# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/cog/main/schemas/compiler_passes.json

passes:
  #############
  # Dashboard #
  #############

  - deprecate_object:
      object: dashboard.Dashboard
      message: Prefer using dashboardv2.Dashboard instead.

  # These fields are incorrectly set as non-required in the CUE schema.
  # Loading a dashboard with these set to null will fail.
  - fields_set_required:
      fields: [
        dashboard.Dashboard.annotations,
        dashboard.Dashboard.templating,
      ]
      
  - fields_set_not_required:
      fields: [
        dashboard.AnnotationQuery.datasource, # This field is nullable when we have to check it for a specific Dataquery type.
      ]

  # Defined as an empty type in the CUE schemas.
  # It is also not used at all: references to this type are replaced by a "composable slot"
  - omit:
      objects: [
        dashboard.Target
      ]

  # From: `panels: [...#Panel | #RowPanel | #GraphPanel | #HeatmapPanel]`
  # To: `panels: [...#Panel | #GraphPanel | #HeatmapPanel]`
  - retype_field:
      field: dashboard.Dashboard.panels
      as:
        kind: array
        array:
          value_type:
            kind: disjunction
            disjunction:
              branches:
                - { kind: ref, ref: { referred_pkg: dashboard, referred_type: Panel } }
                - { kind: ref, ref: { referred_pkg: dashboard, referred_type: RowPanel } }
              discriminator: type
              discriminator_mapping:
                row: RowPanel
                cog_discriminator_catch_all: Panel

  - retype_field:
      field: dashboard.Panel.options
      as:
        kind: scalar
        scalar: { scalar_kind: any }

  - retype_field:
      field: dashboard.FieldConfig.custom
      as:
        kind: scalar
        scalar: { scalar_kind: any }

  - retype_field:
      field: dashboard.Panel.Targets
      as:
        kind: array
        array:
          value_type:
            kind: composable_slot
            composable_slot: { variant: dataquery }

  # typed as `links?: [...]` in the original schema
  - retype_field:
      field: dashboard.FieldConfig.links
      as:
        kind: array
        array:
          value_type:
            kind: ref
            ref: { referred_pkg: dashboard, referred_type: DashboardLink }

  # Add a few missing fields.
  # This is meant to be removed once the schema is updated.
  - add_object:
      object: dashboard.AnnotationEventFieldSource
      comments:
        - Annotation event field source. Defines how to obtain the value for an annotation event field.
        - '- "field": Find the value with a matching key (default)'
        - '- "text": Write a constant string into the value'
        - '- "skip": Do not include the field'
      as:
        kind: enum
        enum:
          values:
            - { type: { kind: scalar, scalar: { scalar_kind: string } }, name: field, value: field }
            - { type: { kind: scalar, scalar: { scalar_kind: string } }, name: text, value: text }
            - { type: { kind: scalar, scalar: { scalar_kind: string } }, name: skip, value: skip }

  - add_object:
      object: dashboard.AnnotationEventFieldMapping
      comments:
        - Annotation event field mapping. Defines how to map a data frame field to an annotation event field.
      as:
        kind: struct
        struct:
          fields:
            - name: source
              comments: [ 'Source type for the field value.' ]
              type:
                kind: ref
                ref: { referred_pkg: dashboard, referred_type: AnnotationEventFieldSource }
            - name: value
              comments: [ 'Constant value to use when source is "text".' ]
              type:
                kind: scalar
                scalar: { scalar_kind: string }
            - name: regex
              comments: [ 'Regular expression to apply to the field value.' ]
              type:
                kind: scalar
                scalar: { scalar_kind: string }

  - add_fields:
      to: dashboard.AnnotationQuery
      fields:
        - name: expr
          type:
            kind: scalar
            scalar: { scalar_kind: string }
        - name: textFormat
          comments:
            - Format for Prometheus annotation text. Label values can be interpolated with templates like {{instance}}.
          type:
            kind: scalar
            scalar: { scalar_kind: string }
        - name: titleFormat
          comments:
            - Format for Prometheus and Loki annotation titles. Label values can be interpolated with templates like {{instance}}.
          type:
            kind: scalar
            scalar: { scalar_kind: string }
        - name: tagKeys
          comments:
            - Comma-separated label keys used as annotation tags.
          type:
            kind: scalar
            scalar: { scalar_kind: string }
        - name: step
          comments:
            - Legacy Prometheus annotation query step interval.
          type:
            kind: scalar
            scalar: { scalar_kind: string }
        - name: useValueForTime
          comments:
            - Use the Prometheus series value as the annotation timestamp.
          type:
            kind: scalar
            scalar: { scalar_kind: bool }
        - name: mappings
          comments:
            - Mappings define how to convert data frame fields to annotation event fields.
          type:
            kind: map
            map:
              indextype:
                kind: scalar
                scalar: { scalar_kind: string }
              valuetype:
                kind: ref
                ref: { referred_pkg: dashboard, referred_type: AnnotationEventFieldMapping }
             
  - add_fields:
      to: dashboard.FieldConfig
      fields:
        - name: fieldMinMax
          type:
            kind: scalar
            scalar: { scalar_kind: bool }

  - retype_field:
      field: dashboard.AnnotationQuery.target
      as:
        kind: composable_slot
        composable_slot: { variant: dataquery }

  #######################
  # Dashboard variables #
  #######################

  - add_fields:
      to: dashboard.VariableModel
      fields:
        - name: auto
          comments: [ 'Dynamically calculates interval by dividing time range by the count specified.' ]
          type:
            kind: scalar
            scalar: { scalar_kind: bool }
            default: false
        - name: auto_min
          comments: [ 'The minimum threshold below which the step count intervals will not divide the time.' ]
          type:
            kind: scalar
            default: '10s'
            scalar: { scalar_kind: string }
        - name: auto_count
          comments:
            - 'How many times the current time range should be divided to calculate the value, similar to the Max data points query option.'
            - 'For example, if the current visible time range is 30 minutes, then the auto interval groups the data into 30 one-minute increments.'
          type:
            kind: scalar
            default: 30
            scalar:
              scalar_kind: int32
              constraints:
                - { op: '>', args: [0] }
        - name: definition
          type: 
            kind: scalar
            scalar: { scalar_kind: string }

  #####################
  # FieldConfigSource #
  #####################

  # Relates to https://github.com/grafana/grafana-foundation-sdk/issues/664
  # We have to duplicate the entire definition of dashboard.FieldConfigSource
  # just to add the `__systemRef` field since overrides are defined as an
  # anonymous struct.
  - retype_object:
      object: dashboard.FieldConfigSource
      comments:
        - The data model used in Grafana, namely the data frame, is a columnar-oriented table structure that unifies both time series and table query results.
        - Each column within this structure is called a field. A field can represent a single time series or table column.
        - Field options allow you to change how the data is displayed in your visualizations.
      as:
        kind: struct
        struct:
          fields:
            - name: defaults
              required: true
              comments:
                - Defaults are the options applied to all fields.
              type:
                kind: ref
                ref: { referred_pkg: dashboard, referred_type: FieldConfig }
            - name: overrides
              required: true
              comments:
                - Overrides are the options applied to specific fields overriding the defaults.
              type:
                kind: array
                array:
                  value_type:
                    kind: struct
                    struct:
                      fields:
                        - name: __systemRef
                          type:
                            kind: scalar
                            scalar: { scalar_kind: string }
                        - name: matcher
                          required: true
                          type:
                            kind: ref
                            ref: { referred_pkg: dashboard, referred_type: MatcherConfig }
                        - name: properties
                          required: true
                          type:
                            kind: array
                            array:
                              value_type:
                                kind: ref
                                ref: { referred_pkg: dashboard, referred_type: DynamicConfigValue }

  #############
  # row panel #
  #############

  # From: `panels: [...#Panel | #RowPanel]`
  # To: `panels: [...#Panel]`
  - retype_field:
      field: dashboard.RowPanel.panels
      as:
        kind: array
        array:
          value_type:
            kind: ref
            ref: { referred_pkg: dashboard, referred_type: Panel }

  ############
  # snapshot #
  ############

  - add_fields:
      to: dashboard.Snapshot
      fields:
        - name: dashboard
          type:
            kind: ref
            ref: { referred_pkg: dashboard, referred_type: Dashboard }

  # Some future-proofing
  - constant_to_enum:
      objects:
        - dashboard.DashboardLinkPlacement
        - dashboard.ActionVariableType
        - dashboard.AnnotationQueryPlacement
