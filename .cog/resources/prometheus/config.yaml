# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/cog/main/schemas/unit.json

inputs:
  - jsonschema:
      url: 'https://raw.githubusercontent.com/grafana/grafana-prometheus-datasource/refs/heads/main/pkg/promlib/models/query.request.schema.json'
      package: prometheus
      metadata:
        kind: composable
        variant: dataquery
        identifier: prometheus
      transformations:
        - '%__config_dir%/schema.transforms.yaml'

builder_transformations:
  - '%__config_dir%/common.builder.transforms.yaml'
