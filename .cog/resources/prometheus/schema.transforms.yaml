# yaml-language-server: $schema=https://raw.githubusercontent.com/grafana/cog/main/schemas/compiler_passes.json

passes:
  - anonymous_structs_to_named: {}
  - anonymous_enum_to_named: {}
  - sanitize_enum_member_names: {}

  # Omit the outer container object; we only need the individual query type
  - omit:
      objects:
        - 'prometheus.prometheus'

  # Rename the query item to Dataquery to match the convention
  - rename_object:
      from: 'prometheus.PrometheusPrometheusQueries'
      to: 'Dataquery'

  - schema_set_entry_point:
      package: prometheus
      entry_point: Dataquery

  - hint_object:
      object: prometheus.Dataquery
      hints: { implements_variant: dataquery }

  - trim_object_name_prefix:
      prefix: PrometheusPrometheusQueries

  # To preserve backward compatibility with the previous schema
  - rename_object:
      from: prometheus.Format
      to: PromQueryFormat
  - rename_object:
      from: prometheus.EditorMode
      to: QueryEditorMode

  - retype_field:
      field: prometheus.Dataquery.datasource
      as:
        kind: ref
        ref: { referred_pkg: common, referred_type: DataSourceRef }

  # Omit the inline datasource type since we replaced it with common.DataSourceRef
  - omit:
      objects:
        - 'prometheus.Datasource'

  # Add a few missing fields.
  # This is meant to be removed once the schema is updated.
  - add_fields:
      to: prometheus.Dataquery
      fields:
        - name: interval
          comments: ['An additional lower limit for the step parameter of the Prometheus query and for the', '`$__interval` and `$__rate_interval` variables.']
          type:
            kind: scalar
            scalar: { scalar_kind: string }
