name: Release
on:
  push:
    branches: ["main"]
  workflow_dispatch: ~

env:
  DEVBOX_VERSION: '0.16.0'

# Grant GITHUB_TOKEN the permissions required to make a release
permissions:
  contents: write # to push new branches
  pull-requests: write # to open PRs
  id-token: write # to retrieve vault secrets

# Allow only one concurrent release, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these releases to complete.
concurrency:
  group: "release"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Prepare and perform a release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install devbox
        uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
        with:
          enable-cache: 'true'
          devbox-version: ${{ env.DEVBOX_VERSION }}

      - name: Generate github token
        id: get-github-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: foundation-sdk-ci

      - name: Prepare a release
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global url."https://x-access-token:${{ steps.get-github-token.outputs.token }}@github.com/".insteadOf "git@github.com:"

          devbox run make prepare-release
        env:
          TERM: 'xterm'
          LOG_LEVEL: '7' # debug
          GOGC: 'off'
          GH_TOKEN: ${{ steps.get-github-token.outputs.token }} # to be used by `gh`
          DRY_RUN: 'no'
          SKIP_VALIDATION: 'no'

      - name: Release
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git config --global url."https://x-access-token:${{ steps.get-github-token.outputs.token }}@github.com/".insteadOf "git@github.com:"

          devbox run ./scripts/release.sh
        env:
          TERM: 'xterm'
          LOG_LEVEL: '7' # debug
          GOGC: 'off'
          DRY_RUN: 'no'
